<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Status</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .status {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .weight-container {
            margin: 30px 0;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .weight {
            font-size: 4em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .unit {
            font-size: 1.5em;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
        }
        
        .icon {
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        .timestamp {
            color: #95a5a6;
            font-size: 0.9em;
            margin-top: 20px;
        }
        
        .error {
            color: #e74c3c;
            font-size: 1.2em;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📦</div>
        <h1>Package Status</h1>
        <div class="status" id="status">Package in process of shipping</div>
        <div class="weight-container">
            <div class="weight" id="weight">0.000</div>
            <div class="unit">pounds</div>
        </div>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        // Get weight from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const weight = urlParams.get('weight');
        
        if (weight) {
            document.getElementById('weight').textContent = parseFloat(weight).toFixed(3);
            document.getElementById('status').textContent = 'Package in process of shipping';
        } else {
            document.getElementById('weight').textContent = '---';
            document.getElementById('status').innerHTML = '<span class="error">No package data found</span>';
        }
        
        // Display current time
        const now = new Date();
        document.getElementById('timestamp').textContent = 'Scanned at: ' + now.toLocaleString();
    </script>
</body>
</html>
